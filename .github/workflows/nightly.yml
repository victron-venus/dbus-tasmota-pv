name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  nightly-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create PackageManager archive
        run: |
          PKG_NAME="dbus-tasmota-pv"
          ARCHIVE="${PKG_NAME}-nightly.tar.gz"
          mkdir -p "${PKG_NAME}"
          cp dbus-tasmota-pv.py "${PKG_NAME}/" 2>/dev/null || true
          cp setup gitHubInfo version "${PKG_NAME}/" 2>/dev/null || true
          tar -czf "$ARCHIVE" "${PKG_NAME}/"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_OUTPUT

      - name: Create GitHub Nightly Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: nightly
          name: "Nightly Build (Development)"
          body: |
            Automated daily package for Venus OS testing.
            Commit: ${{ github.sha }}
          prerelease: true
          overwrite_files: true
          files: dbus-tasmota-pv-nightly.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
