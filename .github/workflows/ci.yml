name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install linters
        run: pip install ruff
      
      - name: Ruff lint
        run: ruff check --select=E,F,W --ignore=E501,E722,E731,F401,F541,F841,W291,W293 *.py
      
      - name: Syntax check
        run: python -m py_compile *.py
