name: Python Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 5 * * 2'

permissions:
  contents: read

jobs:
  python-security:
    name: Python Security
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: '3.12'

    - name: Install security tools
      run: |
        pip install bandit

    - name: Run Bandit security linter
      run: |
        set +e
        bandit -r . -f json -o bandit-results.json 2>/dev/null
        set -e

        python3 -c "
        import json
        sarif = {'version': '2.1.0', '\$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/sarif-2.1.0-obj.json', 'runs': [{'tool': {'driver': {'name': 'Bandit', 'version': '1.0.0', 'informationUri': 'https://bandit.readthedocs.io/', 'rules': []}}, 'results': []}]}
        try:
            with open('bandit-results.json') as f:
                data = json.load(f)
            for r in data.get('results', []):
                sarif['runs'][0]['results'].append({'ruleId': r.get('test_id', ''), 'message': {'text': r.get('issue_text', '')}, 'locations': [{'physicalLocation': {'artifactLocation': {'uri': r.get('filename', '')}, 'region': {'startLine': r.get('line_number', 0)}}}], 'level': 'warning'})
        except Exception:
            pass
        with open('bandit-results.sarif', 'w') as f:
            json.dump(sarif, f)
        "

    - name: Upload Bandit results
      uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
      with:
        sarif_file: bandit-results.sarif
        category: python-bandit
