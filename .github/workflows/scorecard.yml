name: Scorecard security audit

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '30 2 * * 3'  # Weekly on Wednesdays at 2:30 AM UTC

# Declare default permissions as read only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to code-scanning dashboard.
      security-events: write
      # Needed for GitHub OIDC token
      id-token: write

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        persist-credentials: false

    - name: Run Scorecard analysis
      uses: ossf/scorecard-action@0864cf19026789058feabb7e87baa5f140aac736 # v2.3.1
      with:
        results_file: results.sarif
        results_format: sarif
        # Public repos don't need token, private repos need PAT with specific permissions
        repo_token: ${{ secrets.SCORECARD_TOKEN }}
        # Publish the results for public repositories
        publish_results: true

    - name: Upload Scorecard results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
      with:
        sarif_file: results.sarif
