sonar.organization=victron-venus
sonar.projectKey=victron-venus_dbus-tasmota-pv
sonar.sources=.
sonar.exclusions=**/test_*.py,**/tests/**,logs/**,.venv/**
sonar.sourceEncoding=UTF-8
sonar.python.version=3.14

# Ignore HTTP security hotspot (Tasmota device only supports HTTP on LAN)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.e1.resourceKey=dbus-tasmota-pv.py

# Ignore shell best-practice issues (intentional - scripts target POSIX compatibility)
sonar.issue.ignore.multicriteria=e2,e3,e4,e5
sonar.issue.ignore.multicriteria.e2.ruleKey=shelldre:S7688
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.sh
sonar.issue.ignore.multicriteria.e3.ruleKey=shelldre:S7677
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.sh
sonar.issue.ignore.multicriteria.e4.ruleKey=shelldre:S100
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.sh
sonar.issue.ignore.multicriteria.e5.ruleKey=shelldre:S7686
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*.sh
